<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilbehør & Knapper | Garnstuen.dk</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL THEME STYLES --- */
        :root {
            --bg-vellum: #F9F7F2;
            --text-dark: #3E3A35;
            --text-muted: #7A7A7A;
            --gold-accent: rgba(197, 163, 113, 0.6);
            --pastel-sage: #849684;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-vellum); color: var(--text-dark); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        main { flex: 1; position: relative; overflow: hidden; /* Added relative positioning for random buttons */ }

        /* --- THE PRISTINE HEADER --- */
        header { 
            padding: 20px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background-color: var(--bg-vellum);
            position: relative;
            z-index: 1000;
        }
        .logo img { 
            max-height: 80px; 
            width: auto; 
            display: block; 
        }
        
        .nav-links { 
            display: flex; 
            gap: 25px; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-weight: 500; 
            transition: all 0.3s ease;
        }
        .nav-links a:hover { color: #C5A371; }
        .nav-links a.active-link { color: #C5A371; }

        .header-actions { display: flex; align-items: center; gap: 20px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; }
        
        .menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 25px; height: 18px; cursor: pointer; }
        .menu-toggle span { width: 100%; height: 2px; background-color: var(--text-dark); transition: all 0.3s ease; }

        /* --- SVG ART SECTION --- */
        .art-hero {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 60px 20px 20px; 
            max-width: 600px; 
            margin: 0 auto;
        }

        /* --- DECORATIVE RANDOM BUTTONS --- */
        .decorative-btn {
            position: absolute;
            opacity: 0.08; /* Acts as a very subtle watermark */
            pointer-events: none; /* So users can't accidentally click them */
            z-index: 0;
        }

        /* --- WELCOME TEXT SECTION --- */
        .welcome-section {
            text-align: center;
            max-width: 800px;
            margin: 40px auto 60px; 
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .welcome-section h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .welcome-section p {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-muted);
        }

        /* --- PRODUCT GRID & VINTAGE FRAMES --- */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 0 5% 100px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .product-card { text-align: left; cursor: pointer; }
        
        .img-placeholder { 
            width: 100%; 
            aspect-ratio: 4/5; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            clip-path: polygon(8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%, 0 8%); 
            background-size: cover;
            background-position: center;
            background-color: #EFECE6; 
            transition: transform 0.4s ease; 
        }
        
        .img-placeholder::after { 
            content: ""; 
            position: absolute; 
            inset: 6px; 
            border: 1px solid var(--gold-accent); 
            clip-path: polygon(8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%, 0 8%); 
            pointer-events: none; 
        }
        
        .product-card:hover .img-placeholder { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .product-meta { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 600; margin-top: 10px; }
        .product-desc { font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; line-height: 1.4; }
        .price { display: block; margin-top: 8px; font-size: 0.95rem; color: var(--text-dark); }

        /* --- THE RICH FOOTER --- */
        footer { background-color: #EFECE6; padding: 80px 5% 40px; margin-top: auto; }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 40px; }
        .footer-col h4 { font-family: var(--font-serif); font-size: 1.3rem; margin-bottom: 20px; font-weight: 600; }
        .footer-col p, .footer-col ul { font-size: 0.85rem; color: var(--text-muted); line-height: 1.8; }
        .footer-col ul { list-style: none; }
        .footer-col ul li { margin-bottom: 10px; cursor: pointer; transition: color 0.3s ease; }
        .footer-col ul li:hover { color: var(--text-dark); }
        .footer-icon-text { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px; }
        .footer-icon-text svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 3px; fill: var(--text-muted); }
        .whatsapp-btn { display: inline-flex; align-items: center; gap: 10px; background-color: #25D366; color: white !important; padding: 10px 20px; border-radius: 4px; font-weight: 500; margin-top: 15px; transition: background 0.3s; }
        .whatsapp-btn:hover { background-color: #128C7E; }
        .whatsapp-btn svg { fill: white; width: 18px; height: 18px; margin: 0; }
        .map-link { color: var(--text-dark); border-bottom: 1px solid var(--text-dark); padding-bottom: 2px; font-weight: 500; }
        .footer-logo { max-height: 80px; margin: 0 auto 20px auto; display: block; opacity: 0.8; transition: opacity 0.3s ease; }
        .footer-logo:hover { opacity: 1; }
        .footer-bottom { text-align: center; padding-top: 30px; font-size: 0.8rem; color: var(--text-muted); }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            header { 
                justify-content: center; 
                padding-top: 15px;
                padding-bottom: 15px;
            }
            .header-actions { 
                position: absolute; 
                right: 5%; 
            }
            .header-actions > a {
                display: none; 
            }
            .logo img {
                max-height: 75px; 
            }
            
            .art-hero { padding-top: 30px; }
            .welcome-section h1 { font-size: 2.6rem; }
            
            .nav-links { position: absolute; top: 100%; left: 0; width: 100%; background-color: var(--bg-vellum); flex-direction: column; align-items: center; gap: 20px; padding: 0; height: 0; overflow: hidden; border-bottom: none; z-index: 999; }
            .nav-links.active { padding: 30px 0; height: auto; border-bottom: 1px solid rgba(0,0,0,0.1); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
